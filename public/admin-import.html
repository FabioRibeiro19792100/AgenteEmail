<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Importar Alunos</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Importacao administrativa</h1>
        <p>Use uma linha por aluno. Pode ser so <strong>nome</strong> ou no formato <strong>nome, turma, email, papel, instituicao</strong>. Se a turma nao vier, usamos <strong>Turma Padrao</strong>.</p>
      </section>
      <section class="panel">
        <textarea id="raw" rows="10" placeholder="Joao Silva&#10;Maria Costa, Turma A&#10;Pedro Lima, Turma B, pedro@email.com, monitor, Escola Y"></textarea>
        <div class="row" style="margin-top:16px">
          <button id="importBtn">Importar alunos</button>
          <a href="/admin/students"><button class="ghost" type="button">Ver alunos</button></a>
        </div>
      </section>
      <section class="panel">
        <h2>Links gerados</h2>
        <div id="result" class="card-list"></div>
      </section>
    </main>
    <script src="/assets/common.js"></script>
    <script>
      el("importBtn").onclick = async () => {
        const data = await api("/api/admin/import-students", {
          method: "POST",
          body: JSON.stringify({ raw: el("raw").value })
        });
        el("result").innerHTML = data.created.map((item) => `
          <div class="card">
            <strong>${item.nome}</strong><br />
            <span class="muted">${item.turma}</span><br />
            <a href="${item.link}">${item.link}</a>
          </div>
        `).join("");
      };
    </script>
  </body>
</html>
