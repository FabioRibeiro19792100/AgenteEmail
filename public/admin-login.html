<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso Admin</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Acesso administrativo</h1>
        <p>Area restrita para importar alunos e gerenciar convites individuais.</p>
      </section>
      <section class="panel">
        <label>
          <strong>Senha de admin</strong>
          <input id="password" type="password" placeholder="Digite a senha administrativa" autocomplete="current-password" />
        </label>
        <div class="row" style="margin-top:16px">
          <button id="loginBtn" type="button">Entrar no admin</button>
          <a href="/composer"><button class="ghost" type="button">Ir para cabine</button></a>
        </div>
        <p id="status" class="muted"></p>
      </section>
    </main>
    <script src="/assets/common.js"></script>
    <script>
      const next = new URLSearchParams(location.search).get("next") || "/admin/import";

      async function login() {
        el("status").textContent = "Validando acesso...";
        try {
          await api("/api/admin/login", {
            method: "POST",
            body: JSON.stringify({ password: el("password").value })
          });
          location.href = next.startsWith("/admin") ? next : "/admin/import";
        } catch (error) {
          el("status").textContent = error.message;
        }
      }

      el("loginBtn").onclick = login;
      el("password").addEventListener("keydown", (event) => {
        if (event.key === "Enter") login();
      });
    </script>
  </body>
</html>
