<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alunos</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Alunos e convites</h1>
        <p>Lista centralizada de alunos importados, com links individuais e status do convite.</p>
        <div class="row">
          <a href="/admin/import"><button class="ghost" type="button">Importar alunos</button></a>
        </div>
      </section>
      <section class="panel">
        <div id="students" class="card-list"></div>
      </section>
    </main>
    <script src="/assets/common.js"></script>
    <script>
      (async () => {
        try {
          const data = await api("/api/admin/students");
          el("students").innerHTML = data.students.map((item) => `
            <div class="card">
              <div class="row">
                <div>
                  <strong>${item.email_informado || item.nome}</strong><br />
                  <span class="muted">${item.turma_nome}</span>
                </div>
                <span class="pill">${item.invite_status}</span>
              </div>
              <p>User ID: ${item.user_id}</p>
              <a href="${item.invite_link}">${item.invite_link}</a>
            </div>
          `).join("");
        } catch (error) {
          el("students").innerHTML = `<div class="card">${error.message}</div>`;
        }
      })();
    </script>
  </body>
</html>
